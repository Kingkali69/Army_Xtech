<!DOCTYPE html>
<html>
<head>
    <title>M.I.T.E.L. ZERO-TRUST DEMO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .header {
            background: #1a1a1a;
            padding: 20px;
            border-left: 4px solid #46d946;
            margin-bottom: 20px;
        }
        h1 { 
            color: #46d946; 
            font-size: 24px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 12px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #1a1a1a;
            padding: 15px;
            flex: 1;
            border-left: 3px solid #888;
        }
        .stat-box.quarantined { border-left-color: #ff4444; }
        .stat-box.trusted { border-left-color: #46d946; }
        .stat-box.unknown { border-left-color: #ffaa00; }
        .stat-label {
            color: #888;
            font-size: 11px;
            margin-bottom: 5px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }
        .stat-box.quarantined .stat-value { color: #ff4444; }
        .stat-box.trusted .stat-value { color: #46d946; }
        .stat-box.unknown .stat-value { color: #ffaa00; }
        
        .device-list {
            background: #1a1a1a;
            padding: 20px;
        }
        .device-list h2 {
            color: #46d946;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .device {
            background: #252525;
            padding: 12px;
            margin: 10px 0;
            border-left: 4px solid #888;
        }
        .device.quarantined { 
            border-left-color: #ff4444;
            background: #2a1a1a;
        }
        .device.trusted { border-left-color: #46d946; }
        .device.unknown { border-left-color: #ffaa00; }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .status-badge.quarantined {
            background: #ff4444;
            color: #fff;
        }
        .status-badge.trusted {
            background: #46d946;
            color: #000;
        }
        .status-badge.unknown {
            background: #ffaa00;
            color: #000;
        }
        .device-name {
            color: #e0e0e0;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .device-details {
            color: #888;
            font-size: 11px;
            line-height: 1.6;
        }
        .device-actions {
            margin-top: 10px;
        }
        .btn {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #e0e0e0;
            padding: 6px 12px;
            font-size: 11px;
            cursor: pointer;
            margin-right: 8px;
            font-family: 'Courier New', monospace;
        }
        .btn:hover {
            background: #4a4a4a;
        }
        .btn.register {
            border-color: #46d946;
            color: #46d946;
        }
        .btn.quarantine {
            border-color: #ff4444;
            color: #ff4444;
        }
        #loading {
            color: #ffaa00;
            text-align: center;
            padding: 40px;
            font-size: 16px;
        }
        .footer {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            color: #888;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>M.I.T.E.L. ZERO-TRUST PERIPHERAL AUTHENTICATION</h1>
        <div class="subtitle">Competition #1: Global Threat Modeling Challenge | Live Demo</div>
    </div>

    <div class="stats">
        <div class="stat-box quarantined">
            <div class="stat-label">QUARANTINED</div>
            <div class="stat-value" id="stat-quarantined">--</div>
        </div>
        <div class="stat-box trusted">
            <div class="stat-label">TRUSTED</div>
            <div class="stat-value" id="stat-trusted">--</div>
        </div>
        <div class="stat-box unknown">
            <div class="stat-label">UNKNOWN</div>
            <div class="stat-value" id="stat-unknown">--</div>
        </div>
    </div>

    <div id="loading">⚡ SCANNING DEVICES...</div>

    <div class="device-list" id="device-container" style="display: none;">
        <h2>DETECTED DEVICES</h2>
        <div id="devices"></div>
    </div>

    <div class="footer">
        OMNI + M.I.T.E.L. Integration | Zero-Trust Security Model | Auto-refresh every 3 seconds
    </div>

    <script>
        function deviceAction(deviceId, action) {
            console.log('BUTTON CLICKED:', action, 'for device:', deviceId);
            
            const url = 'http://localhost:8888/api/mitel/device/action';
            const payload = {
                device_id: deviceId,
                action: action
            };
            
            console.log('Sending POST to:', url);
            console.log('Payload:', payload);
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(result => {
                console.log('Response data:', result);
                if (result.success) {
                    console.log('✓ Action successful:', result.message);
                    // Reload devices immediately
                    loadDevices();
                } else {
                    console.error('✗ Action failed:', result.error);
                    alert('Error: ' + result.error);
                }
            })
            .catch(error => {
                console.error('✗ Fetch error:', error);
                alert('Network error: ' + error.message);
            });
        }
        
        function loadDevices() {
            fetch('http://localhost:8888/api/mitel/devices')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('device-container').style.display = 'block';
                    
                    // Update stats
                    document.getElementById('stat-quarantined').textContent = data.quarantined || 0;
                    document.getElementById('stat-trusted').textContent = data.trusted || 0;
                    document.getElementById('stat-unknown').textContent = data.unknown || 0;
                    
                    const container = document.getElementById('devices');
                    container.innerHTML = '';
                    
                    if (data.devices && data.devices.length > 0) {
                        data.devices.forEach(device => {
                            const div = document.createElement('div');
                            div.className = 'device ' + device.trust_status;
                            
                            let buttons = '';
                            if (device.trust_status === 'quarantined') {
                                buttons = '<button class="btn register" onclick="deviceAction(\'' + device.device_id + '\', \'unquarantine\')">UNQUARANTINE</button>';
                            } else if (device.trust_status === 'unknown') {
                                buttons = '<button class="btn register" onclick="deviceAction(\'' + device.device_id + '\', \'register\')">REGISTER DEVICE</button>';
                            } else if (device.trust_status === 'trusted') {
                                buttons = '<span style="color: #46d946;">✓ TRUSTED</span>';
                            }
                            
                            div.innerHTML = 
                                '<div class="status-badge ' + device.trust_status + '">' + device.trust_status.toUpperCase() + '</div>' +
                                '<div class="device-name">' + device.name + '</div>' +
                                '<div class="device-details">' +
                                'Device ID: ' + device.device_id + '<br>' +
                                'Type: ' + device.device_type + ' | VID: ' + device.vendor_id + ' | PID: ' + device.product_id +
                                '</div>' +
                                '<div class="device-actions">' + buttons + '</div>';
                            
                            container.appendChild(div);
                        });
                    } else {
                        container.innerHTML = '<div style="color: #888; padding: 20px; text-align: center;">No devices detected</div>';
                    }
                })
                .catch(error => {
                    document.getElementById('loading').innerHTML = '⚠ ERROR: ' + error.message;
                });
        }
        
        // Load immediately
        loadDevices();
        
        // Auto-refresh every 3 seconds
        setInterval(loadDevices, 3000);
    </script>
</body>
</html>
